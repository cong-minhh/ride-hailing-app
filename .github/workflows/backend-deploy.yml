name: Backend Deploy

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Railway Deploy
        run: |
          curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"
          echo "Deploy triggered on Railway"
